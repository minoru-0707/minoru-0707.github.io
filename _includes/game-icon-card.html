<li class="game-icon-item" title="{{ include.game.title }}">
    <a href="{{ include.game.url }}" target="_blank">
        <div class="game-icon-thumb">
            <img src="{{ include.game.image }}" alt="{{ include.game.title }}">
            <div class="game-icon-overlay">
                <span class="game-icon-title">{{ include.game.title }}</span>
            </div>
        </div>
    </a>
</li>
