<li class="card-item" style="margin-bottom: 15px;">
    <a href="{{ include.game.url }}" target="_blank">
        <div class="card-thumb">
            <img src="{{ include.game.image }}" alt="{{ include.game.title }}">
        </div>
        
        <div class="card-body" style="padding: 10px;">
            <h4 style="margin: 0; font-size: 13px; font-weight: bold; line-height: 1.4; color: #212529;">
                {{ include.game.title }}
            </h4>
        </div>
    </a>
</li>
